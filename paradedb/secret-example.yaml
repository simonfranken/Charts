# Example Secret for ParadeDB
# This secret is NOT created by the chart - create it before installing
# or reference an existing secret with the credentials.

# Create the secret:
# kubectl -n <namespace> create secret generic paradedb-creds \
#   --from-literal=username=postgres \
#   --from-literal=password=your-secure-password

# Or as a manifest (store in a secrets manager, not in git):
---
apiVersion: v1
kind: Secret
metadata:
  name: paradedb-creds
  namespace: <namespace>
type: Opaque
stringData:
  username: "postgres"
  password: "your-secure-password"

# ── Production secret management ────────────────────────────────────────────
# For production, consider using:
#   - External Secrets Operator (ESO)
#   - HashiCorp Vault
#   - AWS Secrets Manager / Azure Key Vault / GCP Secret Manager
#   - Sealed Secrets
