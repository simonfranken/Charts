name: Validate Charts

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint and render charts
        run: |
          set -euo pipefail
          for chart in */Chart.yaml; do
            dir="${chart%/Chart.yaml}"
            echo "::group::Validating ${dir}"
            helm dependency build "$dir"
            helm lint "$dir"
            helm template test "$dir" >/dev/null
            echo "::endgroup::"
          done
