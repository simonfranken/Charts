apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "affine.fullname" . }}
  labels:
    {{- include "affine.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "affine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "affine.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.securityContext.enabled }}
      securityContext:
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: affine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3010
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "affine.fullname" . }}
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default (include "affine.fullname" .) }}
          env:
            {{- if .Values.paradedb.enabled }}
            - name: _DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paradedb.postgresql.existingSecret }}
                  key: username
            - name: _DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paradedb.postgresql.existingSecret }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(_DB_USER):$(_DB_PASSWORD)@{{ .Release.Name }}-paradedb:5432/{{ .Values.paradedb.postgresql.database }}"
            {{- else if not .Values.database.url }}
            - name: DATABASE_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            {{- end }}
            {{- if and .Values.redis.enabled .Values.redis.auth.enabled (not .Values.redis.auth.acl.enabled) }}
            - name: REDIS_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.auth.existingSecret }}
                  key: password
            {{- end }}
            {{- range .Values.extraEnvVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: affine-storage
              mountPath: /root/.affine/storage
            - name: affine-config
              mountPath: /root/.affine/config
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: affine-storage
          {{- if .Values.persistence.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.storage.existingClaim | default (printf "%s-storage" (include "affine.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: affine-config
          {{- if .Values.persistence.config.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.config.existingClaim | default (printf "%s-config" (include "affine.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
