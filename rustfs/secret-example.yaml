# Example Secret for RustFS
# This secret is NOT created by the chart - create it before installing.

# Create the secret:
# kubectl -n <namespace> create secret generic rustfs-creds \
#   --from-literal=accessKey=rustfsadmin \
#   --from-literal=secretKey=your-secure-password

# Or as a manifest (store in a secrets manager, not in git):
---
apiVersion: v1
kind: Secret
metadata:
  name: rustfs-creds
  namespace: <namespace>
type: Opaque
stringData:
  accessKey: "rustfsadmin"
  secretKey: "your-secure-password"

# ── Production secret management ────────────────────────────────────────────
# For production, consider using:
#   - External Secrets Operator (ESO)
#   - HashiCorp Vault
#   - AWS Secrets Manager / Azure Key Vault / GCP Secret Manager
#   - Sealed Secrets
