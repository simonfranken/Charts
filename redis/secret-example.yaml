# Example Secrets for Redis
# These secrets are NOT created by the chart — create them before installing.

# ── Standard password authentication ────────────────────────────────────────
# Required when auth.enabled=true (the default).
# The secret must contain the key: password

# Create with kubectl:
#   kubectl -n <namespace> create secret generic redis-creds \
#     --from-literal=password=your-secure-password

# Or as a manifest (store in a secrets manager, not in git):
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-creds
  namespace: <namespace>
type: Opaque
stringData:
  password: "your-secure-password"

# ── ACL mode (auth.acl.enabled=true) ────────────────────────────────────────
# Required only when ACL mode is enabled.
# The secret must contain the key: acl.conf
#
# ACL file format — one rule per line.
# See: https://redis.io/docs/management/security/acl/
#
# Example rules:
#   user default off nopass nocommands    # disable the default user
#   user app1 on >app1pass ~app1:* +@all  # app1 can only access keys prefixed "app1:"
#   user app2 on >app2pass ~app2:* +@all  # app2 can only access keys prefixed "app2:"

# Create with kubectl:
#   kubectl -n <namespace> create secret generic redis-acl \
#     --from-file=acl.conf=/path/to/your/acl.conf

# Or as a manifest:
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-acl
  namespace: <namespace>
type: Opaque
stringData:
  acl.conf: |
    user default off nopass nocommands
    user app1 on >app1pass ~app1:* +@all
    user app2 on >app2pass ~app2:* +@all

# ── Production secret management ────────────────────────────────────────────
# For production, consider using:
#   - External Secrets Operator (ESO)
#   - HashiCorp Vault
#   - AWS Secrets Manager / Azure Key Vault / GCP Secret Manager
#   - Sealed Secrets
