apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "redis.fullname" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "redis.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- if .Values.securityContext.enabled }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        {{- else }}
        {}
        {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - redis-server
            - /etc/redis/redis.conf
            {{- if and .Values.auth.enabled (not .Values.auth.acl.enabled) }}
            - --requirepass
            - $(REDIS_PASSWORD)
            {{- end }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          {{- if or (and .Values.auth.enabled (not .Values.auth.acl.enabled)) .Values.auth.acl.enabled }}
          env:
            {{- if and .Values.auth.enabled (not .Values.auth.acl.enabled) }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: password
            {{- end }}
            {{- if .Values.auth.acl.enabled }}
            - name: REDIS_PROBE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.acl.probeSecret }}
                  key: username
            - name: REDIS_PROBE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.acl.probeSecret }}
                  key: password
            {{- end }}
          {{- end }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            runAsNonRoot: true
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/redis/redis.conf
              subPath: redis.conf
              readOnly: true
            {{- if .Values.auth.acl.enabled }}
            - name: acl
              mountPath: /etc/redis/acl.conf
              subPath: acl.conf
              readOnly: true
            {{- end }}
            - name: data
              mountPath: /data
            {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
            - name: tmp
              mountPath: /tmp
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                {{- if .Values.auth.acl.enabled }}
                - redis-cli --user "$REDIS_PROBE_USER" --pass "$REDIS_PROBE_PASSWORD" ping | grep -q PONG
                {{- else if .Values.auth.enabled }}
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
                {{- else }}
                - redis-cli ping | grep -q PONG
                {{- end }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                {{- if .Values.auth.acl.enabled }}
                - redis-cli --user "$REDIS_PROBE_USER" --pass "$REDIS_PROBE_PASSWORD" ping | grep -q PONG
                {{- else if .Values.auth.enabled }}
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
                {{- else }}
                - redis-cli ping | grep -q PONG
                {{- end }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "redis.fullname" . }}
        {{- if .Values.auth.acl.enabled }}
        - name: acl
          secret:
            secretName: {{ .Values.auth.acl.existingSecret }}
        {{- end }}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.containerSecurityContext.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- range .Values.persistence.accessModes }}
          - {{ . | quote }}
          {{- end }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
