apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lobehub.fullname" . }}
  labels:
    {{- include "lobehub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lobehub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lobehub.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.securityContext.enabled }}
      securityContext:
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      {{- end }}
      containers:
        - name: lobehub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3210
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "lobehub.fullname" . }}
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default (include "lobehub.fullname" .) }}
          {{- if or .Values.paradedb.enabled .Values.rustfs.enabled }}
          env:
            {{- if .Values.paradedb.enabled }}
            - name: _DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paradedb.postgresql.existingSecret }}
                  key: username
            - name: _DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paradedb.postgresql.existingSecret }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://$(_DB_USER):$(_DB_PASSWORD)@{{ .Release.Name }}-paradedb:5432/{{ .Values.paradedb.postgresql.database }}"
            {{- end }}
            {{- if .Values.rustfs.enabled }}
            - name: S3_ENDPOINT
              value: "http://{{ .Release.Name }}-rustfs:9000"
            - name: S3_BUCKET
              value: {{ .Values.rustfs.bucket | quote }}
            - name: S3_ENABLE_PATH_STYLE
              value: "1"
            - name: S3_SET_ACL
              value: "0"
            - name: LLM_VISION_IMAGE_USE_BASE64
              value: "1"
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rustfs.existingSecret }}
                  key: accessKey
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rustfs.existingSecret }}
                  key: secretKey
            {{- end }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
