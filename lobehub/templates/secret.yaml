apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lobehub.fullname" . }}
  labels:
    {{- include "lobehub.labels" . | nindent 4 }}
type: Opaque
stringData:
  ## ── Core encryption keys ────────────────────────────────────────────
  {{- if .Values.secrets.keyVaultsSecret }}
  KEY_VAULTS_SECRET: {{ .Values.secrets.keyVaultsSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.authSecret }}
  AUTH_SECRET: {{ .Values.secrets.authSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.jwksKey }}
  JWKS_KEY: {{ .Values.secrets.jwksKey | quote }}
  {{- end }}

  ## ── Database ────────────────────────────────────────────────────────
  {{- if .Values.database.url }}
  DATABASE_URL: {{ .Values.database.url | quote }}
  {{- end }}

  ## ── S3 credentials ──────────────────────────────────────────────────
  {{- if and .Values.s3.enabled .Values.secrets.s3AccessKeyId }}
  S3_ACCESS_KEY_ID: {{ .Values.secrets.s3AccessKeyId | quote }}
  {{- end }}
  {{- if and .Values.s3.enabled .Values.secrets.s3SecretAccessKey }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secrets.s3SecretAccessKey | quote }}
  {{- end }}

  ## ── Auth provider secrets ────────────────────────────────────────────
  {{- if and .Values.auth.google.enabled .Values.secrets.authGoogleSecret }}
  AUTH_GOOGLE_SECRET: {{ .Values.secrets.authGoogleSecret | quote }}
  {{- end }}
  {{- if and .Values.auth.github.enabled .Values.secrets.authGithubSecret }}
  AUTH_GITHUB_SECRET: {{ .Values.secrets.authGithubSecret | quote }}
  {{- end }}
  {{- if and .Values.auth.microsoft.enabled .Values.secrets.authMicrosoftSecret }}
  AUTH_MICROSOFT_SECRET: {{ .Values.secrets.authMicrosoftSecret | quote }}
  {{- end }}
  {{- if and .Values.auth.cognito.enabled .Values.secrets.authCognitoSecret }}
  AUTH_COGNITO_SECRET: {{ .Values.secrets.authCognitoSecret | quote }}
  {{- end }}

  ## ── SMTP password ────────────────────────────────────────────────────
  {{- if and .Values.auth.smtp.enabled .Values.secrets.smtpPassword }}
  SMTP_PASS: {{ .Values.secrets.smtpPassword | quote }}
  {{- end }}

  ## ── Extra secrets (e.g. AI provider API keys) ────────────────────────
  {{- range $key, $val := .Values.extraSecrets }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
