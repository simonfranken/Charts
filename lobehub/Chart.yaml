apiVersion: v2
name: lobehub
description: LobeHub - Open-source AI chat platform with knowledge base, multimodal AI, and plugin support
type: application
version: 1.2.7
appVersion: "latest"
home: https://lobehub.com
sources:
  - https://github.com/lobehub/lobe-chat
maintainers:
  - name: Simon Franken
    email: mail@simon-franken.de
keywords:
  - ai
  - chat
  - llm
  - nextjs
dependencies:
  - name: paradedb
    version: "1.0.0"
    repository: "https://simonfranken.github.io/Charts"
    condition: paradedb.enabled
  - name: rustfs
    version: "1.0.3"
    repository: "https://simonfranken.github.io/Charts"
    condition: rustfs.enabled
