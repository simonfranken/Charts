image:
  repository: nousresearch/hermes-agent
  tag: "v2026.4.16"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Pod-level security context
podSecurityContext:
  runAsUser: 10000
  runAsGroup: 10000
  fsGroup: 10000

statefulset:
  replicas: 1

gateway:
  args:
    - gateway
    - run
  env:
    - name: API_SERVER_HOST
      value: "0.0.0.0"
  envFrom:
    secrets: []
    configMaps: []
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi

dashboard:
  args:
    - dashboard
    - --host
    - 0.0.0.0
    - --insecure
  env:
    - name: GATEWAY_HEALTH_URL
      value: http://127.0.0.1:8642
  envFrom:
    secrets: []
    configMaps: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 10Gi
  storageClass: ""
  annotations: {}

service:
  type: ClusterIP
  port: 9119

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: hermes-dashboard.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}
