apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hermes.fullname" . }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "hermes.fullname" . }}
  replicas: {{ .Values.statefulset.replicas }}
  selector:
    matchLabels:
      {{- include "hermes.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hermes.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- if .Values.podSecurityContext.enabled }}
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}
        {{- else }}
        {}
        {{- end }}
      {{- if .Values.volumePermissions.enabled }}
      initContainers:
        - name: volume-permissions
          image: "{{ .Values.volumePermissions.image.repository }}:{{ .Values.volumePermissions.image.tag }}"
          imagePullPolicy: {{ .Values.volumePermissions.image.pullPolicy }}
          command:
            - sh
            - -c
            - >-
              chown {{ .Values.volumePermissions.chown.user }}:{{ .Values.volumePermissions.chown.group }} /opt/data &&
              chmod {{ .Values.volumePermissions.chmod }} /opt/data
          securityContext:
            runAsUser: {{ .Values.volumePermissions.securityContext.runAsUser }}
            runAsNonRoot: {{ .Values.volumePermissions.securityContext.runAsNonRoot }}
          volumeMounts:
            - name: data
              mountPath: /opt/data
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext:
            runAsNonRoot: {{ .Values.containerSecurityContext.runAsNonRoot }}
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
          {{- end }}
          args:
            {{- toYaml .Values.gateway.args | nindent 12 }}
          ports:
            - name: gateway
              containerPort: 8642
              protocol: TCP
          {{- with .Values.gateway.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.gateway.envFrom.secrets .Values.gateway.envFrom.configMaps }}
          envFrom:
            {{- range .Values.gateway.envFrom.secrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.gateway.envFrom.configMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /opt/data

        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext:
            runAsNonRoot: {{ .Values.containerSecurityContext.runAsNonRoot }}
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
          {{- end }}
          args:
            {{- toYaml .Values.dashboard.args | nindent 12 }}
          ports:
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          {{- with .Values.dashboard.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.dashboard.envFrom.secrets .Values.dashboard.envFrom.configMaps }}
          envFrom:
            {{- range .Values.dashboard.envFrom.secrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.dashboard.envFrom.configMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /opt/data

      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hermes.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
