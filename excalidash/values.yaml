image:
  backend:
    repository: zimengxiong/excalidash-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  frontend:
    repository: zimengxiong/excalidash-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: excalidash.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: excalidash-tls
    #   hosts:
    #     - excalidash.example.com

persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  size: 10Gi
  accessModes:
    - ReadWriteOnce

resources:
  backend:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  frontend:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

securityContext:
  enabled: false
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

nodeSelector: {}
tolerations: []
affinity: {}

probes:
  backend:
    liveness:
      httpGet:
        path: /health
        port: backend
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: backend
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  frontend:
    liveness:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

backend:
  env:
    PORT: "8000"
    NODE_ENV: production
    DATABASE_URL: file:/app/prisma/dev.db
    FRONTEND_URL: https://excalidash.example.com
    TRUST_PROXY: "false"
    AUTH_MODE: local
    UPDATE_CHECK_OUTBOUND: "true"
  extraEnv: {}

frontend:
  env:
    BACKEND_URL: localhost:8000
  extraEnv: {}

secrets:
  existingSecret: ""
  secretEnv: {}
    # JWT_SECRET: "replace-me-with-min-32-chars"
    # CSRF_SECRET: "replace-me"
    # OIDC_CLIENT_SECRET: "replace-me"
